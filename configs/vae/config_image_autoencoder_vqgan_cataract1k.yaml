model:
  base_learning_rate: 4.5e-6
  target: sg2vid.taming.taming.models.vqgan.VQModel
  params:
    embed_dim: 1
    n_embed: 16384
    image_key: image
    ddconfig:
      double_z: false
      z_channels: 1
      resolution: 128
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions:
      - 16
      dropout: 0.0
    lossconfig:
      target: sg2vid.taming.taming.modules.losses.vqperceptual.VQLPIPSWithDiscriminator
      params:
        disc_conditional: false
        disc_in_channels: 3
        disc_num_layers: 2
        disc_start: 1
        disc_weight: 0.6
        codebook_weight: 1.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 16
    num_workers: 16
    train:
      target: sg2vid.taming.taming.data.surgicaldataset.Cataract1KTrain
      params:
        size: 128
        num_label: 14
        txt_file: /path/to/dataset/Cataract-1K/split/cataract1k_train.txt
        data_root: /path/to/dataset/Cataract-1K
        augment: True
    validation:
      target: sg2vid.taming.taming.data.surgicaldataset.Cataract1KValidation
      params:
        size: 128
        num_label: 14
        txt_file: /path/to/dataset/Cataract-1K/split/cataract1k_val.txt
        data_root: /path/to/dataset/Cataract-1K
        augment: False