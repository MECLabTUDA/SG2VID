model:
  base_learning_rate: 4.5e-6
  target: sg2vid.ldm.models.autoencoder.AutoencoderKL
  params:
    monitor: "val/rec_loss"
    embed_dim: 4
    lossconfig:
      target: sg2vid.ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 50001
        kl_weight: 0.000001
        disc_weight: 0.5

    ddconfig:
      double_z: True
      z_channels: 4
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult: [1,2,4,4]  # num_down = len(ch_mult)-1
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0
 
data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 24
    num_workers: 16
    train:
      target: sg2vid.ldm.data.surgicaldataset.Cholec80Train
      params:
        size: 128
        txt_file: /path/to/dataset/Cholec-80/split/cholec80_train.txt
        data_root: /path/to/dataset/Cholec-80/video_frames 
    validation:
      target: sg2vid.ldm.data.surgicaldataset.Cholec80Validation
      params:
        size: 128
        txt_file: /path/to/dataset/Cholec-80/split/cholec80_val.txt
        data_root: /path/to/dataset/Cholec-80/video_frames 