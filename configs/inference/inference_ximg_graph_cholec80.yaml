output_dir: ./samples/Cholec-80/sg2vid_ximg
pretrained_model_path: TIGER-Lab/ConsistI2V
finetuned_autoencoder_path: ./checkpoints/Cholec-80/vae_vid_diffusion
unet_path: ./checkpoints/Cholec-80/video_diffusion_ximg_graph/checkpoint/unet
unet_ckpt_prefix: "module."
pipeline_pretrained_path: null

resume_sampling: 0
num_workers: 16
batch_size: 1

test_data:
  dataset:           surgical
  dataset_name:      cholec80
  video_folder:      /path/to/dataset/Cholec-80
  class_size:        13
  split_mode:        test
  return_graph_emb:  true
  sample_size:       128
  sample_n_frames:   16
  overlap_size:      8

  embedding_type: combined # combined or masked or segclip
  model_masked: ./checkpoints/Cholec-80/graphencoder_masked/best_val_loss.pth
  model_segclip: ./checkpoints/Cholec-80/graphencoder_segclip/best_val_loss.pth
  graph_input_dim: 20
  graph_hidden_dim: 256
  graph_embedding_dim: 256 
  trainable: False
  graph_conv_type: GATv2Conv
  graph_norm_type: LayerNorm

sampling_kwargs:
  height: 128
  width: 128
  n_frames: 16
  steps: 50
  ddim_eta: 0.0
  guidance_scale_txt: 7.5
  guidance_scale_img: 0.0
  guidance_rescale: 0.0
  num_videos_per_prompt: 1
  frame_stride: 3

unet_additional_kwargs:
  variant: null
  n_temp_heads: 8
  augment_temporal_attention: true
  temp_pos_embedding: rotary # rotary or sinusoidal
  first_frame_condition_mode: none
  use_frame_stride_condition: false
  noise_sampling_method: pyoco_mixed # vanilla or pyoco_mixed or pyoco_progressive
  noise_alpha: 1.0

unet_graph_kwargs:
  class_label_condition_mode: true
  class_embeddings_concat: true
  class_embed_type: identity
  time_embedding_dim: 512
  ignore_mismatched_sizes: true

noise_scheduler_kwargs:
  beta_start: 0.00085
  beta_end: 0.012
  beta_schedule: linear
  steps_offset: 1
  clip_sample: false
  rescale_betas_zero_snr: false   # true if using zero terminal snr
  timestep_spacing:       leading # "trailing" if using zero terminal snr
  prediction_type:        epsilon # "v_prediction" if using zero terminal snr

frameinit_kwargs:
  enable: false
  camera_motion: null
  noise_level: 999