output_dir: ./checkpoints/Cataracts-50
pretrained_model_path: TIGER-Lab/ConsistI2V
# resume_from_checkpoint: 
finetuned_autoencoder_path: ./checkpoints/Cataracts-50/vae_vid_diffusion
only_save_latest_checkpoint: true

noise_scheduler_kwargs:
  num_train_timesteps:    1000
  beta_start:             0.00085
  beta_end:               0.012
  beta_schedule:          linear
  steps_offset:           1
  clip_sample:            false
  rescale_betas_zero_snr: false     # true if using zero terminal snr
  timestep_spacing:       leading # "trailing" if using zero terminal snr
  prediction_type:        epsilon # "v_prediction" if using zero terminal snr

train_data:
  dataset:           surgical
  dataset_name:      cataracts50
  video_folder:      /path/to/dataset/Cataracts-50
  class_size:        18
  split_mode:        train
  return_graph_emb:  true
  sample_size:       128
  sample_n_frames:   16

  embedding_type: combined # combined or masked or segclip
  model_masked: ./checkpoints/Cataracts-50/graphencoder_masked/best_val_loss.pth
  model_segclip: ./checkpoints/Cataracts-50/graphencoder_segclip/best_val_loss.pth
  graph_input_dim: 25
  graph_hidden_dim: 256
  graph_embedding_dim: 256 
  trainable: False
  graph_conv_type: GATv2Conv
  graph_norm_type: LayerNorm

validation_data:
  prompts:
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."
    - "sequence during cataracts surgery."

  path_to_first_frames:
    - "/path/to/dataset/Cataracts-50/video_frames/train26/0000000890.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train26/0000001589.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train32/0000002172.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train44/0000000133.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train39/0000000472.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train41/0000000740.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train41/0000001255.jpg"
    - "/path/to/dataset/Cataracts-50/video_frames/train39/0000000029.jpg"

  path_to_graphs:
    - "/path/to/dataset/Cataracts-50/scene_graph/train26/0000000890.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train26/0000001589.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train32/0000002172.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train44/0000000133.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train39/0000000472.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train41/0000000740.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train41/0000001255.pt"
    - "/path/to/dataset/Cataracts-50/scene_graph/train39/0000000029.pt"

  num_inference_steps: 50
  ddim_eta: 0.0
  guidance_scale_txt: 7.5
  guidance_scale_img: 1.0
  guidance_rescale: 0.0
  frame_stride: 3

trainable_modules:
  - "all"
  # - "conv3ds."
  # - "tempo_attns."

unet_additional_kwargs:
  variant: null
  n_temp_heads: 8
  augment_temporal_attention: true
  temp_pos_embedding: rotary # rotary or sinusoidal
  first_frame_condition_mode: concat
  use_frame_stride_condition: false
  noise_sampling_method: pyoco_mixed # vanilla or pyoco_mixed or pyoco_progressive
  noise_alpha: 1.0

unet_graph_kwargs:
  class_label_condition_mode: true
  class_embeddings_concat: true
  class_embed_type: identity
  time_embedding_dim: 512
  ignore_mismatched_sizes: true

cfg_random_null_text_ratio: 0.1
cfg_random_null_img_ratio: 0.1

use_ema: false
ema_decay: 0.9999

learning_rate:    5.e-5
train_batch_size: 2
gradient_accumulation_steps: 2
max_grad_norm: 0.5

max_train_epoch:      -1
max_train_steps:      1000000
checkpointing_epochs: -1
checkpointing_steps:  10000
validation_steps:     2000

seed: 42
mixed_precision: bf16
num_workers: 24
enable_xformers_memory_efficient_attention: true

is_image: false
is_debug: false
